<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a4a;
    }
    .toggle-row:last-of-type { border-bottom: none; }
    .toggle-label .title {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }
    .toggle-label .desc {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 22px;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #4caf50; }
    input:checked + .slider::before { transform: translateX(18px); }
    .profile-row {
      padding: 12px 0 4px;
    }
    .profile-row label {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      display: block;
      margin-bottom: 6px;
    }
    .profile-row .desc {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
    }
    .profile-row input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a4a;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .profile-row input[type="text"]:focus {
      border-color: #4caf50;
    }
    .profile-row input[type="text"]::placeholder {
      color: #666;
    }
  </style>
</head>
<body>
  <h1>JioHotstar Auto Skip</h1>

  <div class="toggle-row">
    <div class="toggle-label">
      <div class="title">Skip Intro / Recap</div>
      <div class="desc">Auto-click skip buttons</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="skipIntro" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div class="toggle-label">
      <div class="title">Skip Long Ads</div>
      <div class="desc">Refresh to get shorter ads</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="skipAds" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="profile-row">
    <label for="profileName">Profile Name</label>
    <div class="desc">Auto-select this profile after ad refresh</div>
    <input type="text" id="profileName" placeholder="e.g. Ainesh">
  </div>

  <script src="popup.js"></script>
</body>
</html>
